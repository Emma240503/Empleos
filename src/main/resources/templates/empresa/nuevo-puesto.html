<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Empresa - Publicar puesto', '/css/Empresa/empresa-nuevo-puesto.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav>
  <a th:href="@{/empresa/dashboard}">Dashboard</a>
  <a th:href="@{/empresa/puestos}">Mis puestos</a>
  <div class="nav-right">
    <span class="nav-user" th:text="${session.usuarioNombre}">Empresa</span>
    <a class="btn-salir" th:href="@{/logout}">Salir</a>
  </div>
</nav>
<main>
  <div class="card">
    <h1>Publicar nuevo puesto</h1>
    <form th:action="@{/empresa/puestos/nuevo}" method="post">
      <div class="field">
        <label for="descripcion">Descripcion del puesto</label>
        <input id="descripcion" type="text" name="descripcion" required>
      </div>
      <div class="field">
        <label for="salario">Salario ofrecido</label>
        <input id="salario" type="text" name="salario" required>
      </div>
      <div class="field">
        <label for="tipo">Tipo de publicacion</label>
        <select id="tipo" name="tipo">
          <option value="publico">Público</option>
          <option value="privado">Privado</option>
        </select>
      </div>
      <div class="field">
        <label>Características requeridas</label>
        <div class="caract-row">
          <select name="caracteristicaIds">
            <option value="">-- Ninguna --</option>
            <option th:each="c : ${caracteristicas}" th:value="${c.caracteristicaId}" th:text="${c.nombre}"></option>
          </select>
          <input type="number" name="niveles" min="1" max="5" value="1" placeholder="Nivel">
        </div>
        <div class="caract-row">
          <select name="caracteristicaIds">
            <option value="">-- Ninguna --</option>
            <option th:each="c : ${caracteristicas}" th:value="${c.caracteristicaId}" th:text="${c.nombre}"></option>
          </select>
          <input type="number" name="niveles" min="1" max="5" value="1" placeholder="Nivel">
        </div>
        <div class="caract-row">
          <select name="caracteristicaIds">
            <option value="">-- Ninguna --</option>
            <option th:each="c : ${caracteristicas}" th:value="${c.caracteristicaId}" th:text="${c.nombre}"></option>
          </select>
          <input type="number" name="niveles" min="1" max="5" value="1" placeholder="Nivel">
        </div>
        <div class="caract-row">
          <select name="caracteristicaIds">
            <option value="">-- Ninguna --</option>
            <option th:each="c : ${caracteristicas}" th:value="${c.caracteristicaId}" th:text="${c.nombre}"></option>
          </select>
          <input type="number" name="niveles" min="1" max="5" value="1" placeholder="Nivel">
        </div>
        <div class="caract-row">
          <select name="caracteristicaIds">
            <option value="">-- Ninguna --</option>
            <option th:each="c : ${caracteristicas}" th:value="${c.caracteristicaId}" th:text="${c.nombre}"></option>
          </select>
          <input type="number" name="niveles" min="1" max="5" value="1" placeholder="Nivel">
        </div>
      </div>
      <button type="submit" class="btn">Publicar</button>
    </form>
  </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
