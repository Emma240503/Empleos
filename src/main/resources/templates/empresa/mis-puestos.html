<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Empresa – Mis puestos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 14px; background: #f0f0f0; display: flex; flex-direction: column; min-height: 100vh; color: #333; }
    nav { background: #222; display: flex; align-items: center; padding: 0 20px; height: 48px; gap: 24px; }
    .nav-brand { color: #fff; font-weight: bold; font-size: 15px; text-decoration: none; }
    nav a { color: #ccc; text-decoration: none; font-size: 13px; }
    nav a:hover { color: #fff; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .btn-salir { background: #555; color: #fff; border: none; border-radius: 3px; padding: 4px 12px; font-size: 12px; text-decoration: none; }
    .btn-salir:hover { background: #777; }
    main { flex: 1; padding: 32px 40px; }
    h1 { font-size: 22px; font-weight: normal; margin-bottom: 16px; }
    .btn-nuevo { display: inline-block; background: #3a7bd5; color: #fff; border: none; border-radius: 3px; padding: 7px 16px; font-size: 13px; text-decoration: none; margin-bottom: 20px; }
    .btn-nuevo:hover { background: #2f6abf; }
    table { border-collapse: collapse; width: 100%; background: #e8e8e8; border: 1px solid #ccc; }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #ccc; font-size: 13px; }
    th { background: #d8d8d8; font-weight: bold; }
    tr:last-child td { border-bottom: none; }
    .badge-activo { background: #2e7d32; color: #fff; border-radius: 3px; padding: 2px 8px; font-size: 11px; }
    .badge-inactivo { background: #888; color: #fff; border-radius: 3px; padding: 2px 8px; font-size: 11px; }
    .btn-accion { border: none; border-radius: 3px; padding: 4px 12px; font-size: 12px; cursor: pointer; color: #fff; }
    .btn-desactivar { background: #c62828; }
    .btn-desactivar:hover { background: #b71c1c; }
    .btn-candidatos { background: #1565c0; }
    .btn-candidatos:hover { background: #0d47a1; }
    .acciones { display: flex; gap: 6px; }
    .vacio { color: #888; font-style: italic; }
    footer { background: #222; color: #ccc; font-size: 12px; padding: 12px 20px; display: flex; justify-content: space-between; margin-top: auto; }
    footer p:first-child { color: #fff; font-weight: bold; }
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" th:href="@{/empresa/dashboard}">BolsaEmpleo</a>
  <a th:href="@{/empresa/puestos}">Mis puestos</a>
  <a th:href="@{/empresa/puestos/nuevo}">Publicar puesto</a>
  <div class="nav-right">
    <a class="btn-salir" th:href="@{/logout}">Salir</a>
  </div>
</nav>
<main>
  <h1>Mis puestos</h1>
  <a class="btn-nuevo" th:href="@{/empresa/puestos/nuevo}">Publicar puesto</a>
  <table th:if="${#lists.size(puestos) > 0}">
    <tr>
      <th>Descripción</th>
      <th>Salario</th>
      <th>Tipo</th>
      <th>Activo</th>
      <th>Acciones</th>
    </tr>
    <tr th:each="p : ${puestos}">
      <td th:text="${p.descripcion}"></td>
      <td th:text="${p.salario}"></td>
      <td th:text="${p.tipo}"></td>
      <td>
        <span class="badge-activo" th:if="${p.activo == 1}">Sí</span>
        <span class="badge-inactivo" th:if="${p.activo != 1}">No</span>
      </td>
      <td>
        <div class="acciones">
          <form th:action="@{/empresa/puestos/desactivar/{id}(id=${p.id})}" method="post">
            <button type="submit" class="btn-accion btn-desactivar" th:if="${p.activo == 1}">Desactivar</button>
          </form>
          <a class="btn-accion btn-candidatos" style="text-decoration:none; padding: 4px 12px;"
             th:href="@{/empresa/candidatos/buscar(puestoId=${p.id})}">Buscar candidatos</a>
        </div>
      </td>
    </tr>
  </table>
  <p class="vacio" th:if="${#lists.size(puestos) == 0}">No tenés puestos publicados aún.</p>
</main>
<footer>
  <div><p>Bolsa de Empleo</p><p>Total Soft Inc.</p></div>
  <div style="text-align:right"><p>Contacto: info@bolsaempleo.local</p><p>Créditos: Equipo de desarrollo</p></div>
</footer>
</body>
</html>
