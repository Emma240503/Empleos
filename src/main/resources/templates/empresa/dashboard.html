<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Empresa - Dashboard', '/css/empresa-dashboard.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav>
  <a th:href="@{/empresa/dashboard}">Dashboard</a>
  <a th:href="@{/empresa/puestos}">Mis puestos</a>
  <a th:href="@{/empresa/puestos/nuevo}">Publicar puesto</a>
  <div class="nav-right">
    <span class="nav-user" th:text="${session.usuarioNombre}">Empresa</span>
    <a class="btn-salir" th:href="@{/logout}">Salir</a>
  </div>
</nav>
<main>
  <h1>Empresa</h1>
  <p class="subtitulo">Desde aquí podés administrar tus puestos y buscar candidatos.</p>
  <div class="btn-grid">
    <a class="btn" th:href="@{/empresa/puestos}">Ver mis puestos</a>
    <a class="btn" th:href="@{/empresa/puestos/nuevo}">Publicar nuevo puesto</a>
  </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
