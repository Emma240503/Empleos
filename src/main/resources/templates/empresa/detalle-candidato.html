<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Empresa – Detalle candidato</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 14px; background: #f0f0f0; display: flex; flex-direction: column; min-height: 100vh; color: #333; }
    nav { background: #222; display: flex; align-items: center; padding: 0 20px; height: 48px; gap: 24px; }
    .nav-brand { color: #fff; font-weight: bold; font-size: 15px; text-decoration: none; }
    nav a { color: #ccc; text-decoration: none; font-size: 13px; }
    nav a:hover { color: #fff; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .btn-salir { background: #555; color: #fff; border: none; border-radius: 3px; padding: 4px 12px; font-size: 12px; text-decoration: none; }
    main { flex: 1; padding: 32px 40px; }
    .card { background: #e8e8e8; border: 1px solid #ccc; border-radius: 4px; padding: 24px 32px; max-width: 600px; }
    h1 { font-size: 20px; font-weight: normal; margin-bottom: 16px; }
    .info p { font-size: 13px; margin-bottom: 6px; }
    .info strong { display: inline-block; width: 120px; color: #555; }
    h2 { font-size: 16px; font-weight: normal; margin: 20px 0 12px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #ccc; font-size: 13px; }
    th { background: #d8d8d8; font-weight: bold; }
    .btn-volver { display: inline-block; background: #555; color: #fff; border-radius: 3px; padding: 6px 16px; font-size: 13px; text-decoration: none; margin-top: 16px; }
    footer { background: #222; color: #ccc; font-size: 12px; padding: 12px 20px; display: flex; justify-content: space-between; margin-top: auto; }
    footer p:first-child { color: #fff; font-weight: bold; }
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" th:href="@{/empresa/dashboard}">BolsaEmpleo</a>
  <a th:href="@{/empresa/puestos}">Mis puestos</a>
  <a th:href="@{/empresa/puestos/nuevo}">Publicar puesto</a>
  <div class="nav-right">
    <a class="btn-salir" th:href="@{/logout}">Salir</a>
  </div>
</nav>
<main>
  <div class="card">
    <h1>Detalle de oferente</h1>
    <div class="info">
      <p><strong>Nombre:</strong> <span th:text="${oferente.nombre + ' ' + oferente.primerApellido}"></span></p>
      <p><strong>Identificación:</strong> <span th:text="${oferente.id}"></span></p>
      <p><strong>Email:</strong> <span th:text="${oferente.correo}"></span></p>
      <p><strong>Teléfono:</strong> <span th:text="${oferente.telefono}"></span></p>
      <p><strong>Residencia:</strong> <span th:text="${oferente.ubicacion}"></span></p>
    </div>
    <h2>Habilidades</h2>
    <table>
      <tr><th>Característica</th><th>Nivel</th></tr>
      <tr th:each="h : ${habilidades}">
        <td th:text="${h.caracteristicaCaracteristica.nombre}"></td>
        <td th:text="${h.nivel}"></td>
      </tr>
    </table>
    <a class="btn-volver" th:href="@{/empresa/puestos}">Volver</a>
  </div>
</main>
<footer>
  <div><p>Bolsa de Empleo</p><p>Total Soft Inc.</p></div>
  <div style="text-align:right"><p>Contacto: info@bolsaempleo.local</p><p>Créditos: Equipo de desarrollo</p></div>
</footer>
</body>
</html>
