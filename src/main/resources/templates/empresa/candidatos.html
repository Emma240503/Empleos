<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Empresa – Candidatos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 14px; background: #f0f0f0; display: flex; flex-direction: column; min-height: 100vh; color: #333; }
    nav { background: #222; display: flex; align-items: center; padding: 0 20px; height: 48px; gap: 24px; }
    .nav-brand { color: #fff; font-weight: bold; font-size: 15px; text-decoration: none; }
    nav a { color: #ccc; text-decoration: none; font-size: 13px; }
    nav a:hover { color: #fff; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .btn-salir { background: #555; color: #fff; border: none; border-radius: 3px; padding: 4px 12px; font-size: 12px; text-decoration: none; }
    main { flex: 1; padding: 32px 40px; }
    h1 { font-size: 22px; font-weight: normal; margin-bottom: 4px; }
    .subtitulo { color: #666; font-size: 13px; margin-bottom: 20px; }
    table { border-collapse: collapse; width: 100%; background: #e8e8e8; border: 1px solid #ccc; }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #ccc; font-size: 13px; }
    th { background: #d8d8d8; font-weight: bold; }
    tr:last-child td { border-bottom: none; }
    .btn-ver { background: #1565c0; color: #fff; border: none; border-radius: 3px; padding: 4px 12px; font-size: 12px; text-decoration: none; }
    .btn-ver:hover { background: #0d47a1; }
    .btn-volver { display: inline-block; background: #555; color: #fff; border-radius: 3px; padding: 6px 16px; font-size: 13px; text-decoration: none; margin-top: 16px; }
    .vacio { color: #888; font-style: italic; margin-top: 12px; }
    footer { background: #222; color: #ccc; font-size: 12px; padding: 12px 20px; display: flex; justify-content: space-between; margin-top: auto; }
    footer p:first-child { color: #fff; font-weight: bold; }
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" th:href="@{/empresa/dashboard}">BolsaEmpleo</a>
  <a th:href="@{/empresa/puestos}">Mis puestos</a>
  <a th:href="@{/empresa/puestos/nuevo}">Publicar puesto</a>
  <div class="nav-right">
    <a class="btn-salir" th:href="@{/logout}">Salir</a>
  </div>
</nav>
<main>
  <h1>Candidatos para el puesto</h1>
  <p class="subtitulo">Puesto: <span th:text="${puesto.descripcion}"></span></p>
  <table th:if="${#lists.size(candidatos) > 0}">
    <tr>
      <th>Oferente</th>
      <th>Requisitos cumplidos</th>
      <th>% Coincidencia</th>
      <th>Acción</th>
    </tr>
    <tr th:each="c : ${candidatos}">
      <td th:text="${c.oferente.nombre + ' ' + c.oferente.primerApellido}"></td>
      <td th:text="${c.cumplidos + ' / ' + c.total}"></td>
      <td th:text="${#numbers.formatDecimal(c.porcentaje, 1, 2) + '%'}"></td>
      <td>
        <a class="btn-ver" th:href="@{/empresa/candidatos/{id}(id=${c.oferente.id})}">Ver detalle</a>
      </td>
    </tr>
  </table>
  <p class="vacio" th:if="${#lists.size(candidatos) == 0}">No hay candidatos que coincidan.</p>
  <a class="btn-volver" th:href="@{/empresa/puestos}">Volver</a>
</main>
<footer>
  <div><p>Bolsa de Empleo</p><p>Total Soft Inc.</p></div>
  <div style="text-align:right"><p>Contacto: info@bolsaempleo.local</p><p>Créditos: Equipo de desarrollo</p></div>
</footer>
</body>
</html>
