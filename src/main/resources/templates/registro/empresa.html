<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('BolsaEmpleo - Registro Empresa', '/css/Utiles/registro.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav th:replace="~{fragments :: nav}"></nav>
<main>
    <div class="card">
        <h1>Registro de Empresa</h1>

        <div class="alert-error" th:if="${param.duplicado}">Ya existe una empresa con ese correo.</div>
        <div class="alert-ok"    th:if="${param.exito}">Registro enviado. Esperá la aprobación del administrador.</div>

        <form th:action="@{/registro/empresa}" method="post">
            <div class="field">
                <label for="nombre">Nombre de la empresa</label>
                <input id="nombre" type="text" name="nombre" required>
            </div>
            <div class="field">
                <label for="ubicacion">Ubicación</label>
                <input id="ubicacion" type="text" name="ubicacion" required>
            </div>
            <div class="field">
                <label for="correo">Correo electrónico</label>
                <input id="correo" type="email" name="correo" required>
            </div>
            <div class="field">
                <label for="telefono">Teléfono</label>
                <input id="telefono" type="number" name="telefono" required>
            </div>
            <div class="field">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" name="descripcion" rows="3"></textarea>
            </div>
            <div class="field">
                <label for="contrasenna">Contraseña</label>
                <input id="contrasenna" type="password" name="contrasenna" required>
            </div>
            <button type="submit" class="btn-registro">Registrarse</button>
        </form>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
