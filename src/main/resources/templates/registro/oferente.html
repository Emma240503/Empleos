<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('BolsaEmpleo - Registro Oferente', '/css/registro.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav th:replace="~{fragments :: nav}"></nav>
<main>
    <div class="card">
        <h1>Registro de Oferente</h1>

        <div class="alert-error" th:if="${param.duplicado}">Ya existe un oferente con ese correo.</div>
        <div class="alert-ok" th:if="${param.exito}">Registro enviado. Espera la aprobacion del administrador.</div>

        <form th:action="@{/registro/oferente}" method="post">
            <div class="field">
                <label for="id">Numero de identificacion</label>
                <input id="id" type="text" name="id" required>
            </div>
            <div class="field">
                <label for="nombre">Nombre</label>
                <input id="nombre" type="text" name="nombre" required>
            </div>
            <div class="field">
                <label for="primerApellido">Primer apellido</label>
                <input id="primerApellido" type="text" name="primerApellido" required>
            </div>
            <div class="field">
                <label for="nacionalidad">Nacionalidad</label>
                <input id="nacionalidad" type="text" name="nacionalidad" required>
            </div>
            <div class="field">
                <label for="telefono">Telefono</label>
                <input id="telefono" type="number" name="telefono" required>
            </div>
            <div class="field">
                <label for="correo">Correo electronico</label>
                <input id="correo" type="email" name="correo" required>
            </div>
            <div class="field">
                <label for="ubicacion">Lugar de residencia</label>
                <input id="ubicacion" type="text" name="ubicacion" required>
            </div>
            <div class="field">
                <label for="contrasenna">Contrasena</label>
                <input id="contrasenna" type="password" name="contrasenna" required>
            </div>
            <button type="submit" class="btn-registro">Registrarse</button>
        </form>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
