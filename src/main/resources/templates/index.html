<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('BolsaEmpleo - Inicio', '/css/index.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav th:replace="~{fragments :: nav}"></nav>

<main>
    <h1>Bolsa de Empleo</h1>
    <p class="subtitulo">Últimos 5 puestos públicos</p>

    <div class="puestos-grid">

        <div class="puesto-card" th:each="puesto : ${puestos}">
            <p class="empresa-nombre" th:text="${puesto.empresa.nombre}">Empresa</p>
            <p class="puesto-desc"   th:text="${puesto.descripcion}">Descripción</p>
            <p class="salario">
                $<span th:text="${puesto.salario}">0.00</span>
            </p>
            <span class="btn-detalle">Ver detalle</span>

            <div class="hover-detalle">
                <strong th:text="${puesto.descripcion}">Puesto</strong>
                <ul th:if="${!puesto.caracteristicas.isEmpty()}">
                    <li th:each="c : ${puesto.caracteristicas}">
                        <span th:text="${c.caracteristicaCaracteristica.nombre}">Característica</span>
                        (nivel <span th:text="${c.nivel}">0</span>)
                    </li>
                </ul>
                <p class="sin-caract" th:if="${puesto.caracteristicas.isEmpty()}">
                    Sin características registradas
                </p>
            </div>
        </div>

        <!-- Mensaje si no hay puestos -->
        <p th:if="${#lists.isEmpty(puestos)}" class="empty-state">
            No hay puestos públicos registrados aún.
        </p>

    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
