<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Oferente - Mis habilidades', '/css/Oferente/oferente-habilidades.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav>
  <a th:href="@{/oferente/dashboard}">Dashboard</a>
  <div class="nav-right">
    <span class="nav-user" th:text="${nombre}">Oferente</span>
    <a class="btn-salir" th:href="@{/logout}">Salir</a>
  </div>
</nav>
<main>
  <section class="panel card">
    <h1>Mis habilidades</h1>
    <table th:if="${#lists.size(habilidades) > 0}">
      <tr>
        <th>Característica</th>
        <th>Nivel</th>
        <th>Acción</th>
      </tr>
      <tr th:each="h : ${habilidades}">
        <td th:text="${h.caracteristicaCaracteristica.nombre}"></td>
        <td th:text="${h.nivel}"></td>
        <td>
          <form th:action="@{/oferente/habilidades/eliminar/{id}(id=${h.id})}" method="post">
            <button type="submit" class="btn-eliminar">Eliminar</button>
          </form>
        </td>
      </tr>
    </table>
    <p class="vacio" th:if="${#lists.size(habilidades) == 0}">No tenes habilidades registradas aun.</p>
  </section>

  <aside class="agregar-card card">
    <h2>Agregar habilidad</h2>
    <form th:action="@{/oferente/habilidades/agregar}" method="post">
      <div class="field">
        <label for="caracteristicaId">Característica</label>
        <select id="caracteristicaId" name="caracteristicaId" required>
          <option value="">-- Seleccionar --</option>
          <option th:each="c : ${caracteristicas}"
                  th:value="${c.caracteristicaId}"
                  th:text="${c.nombre}"></option>
        </select>
      </div>
      <div class="field">
        <label for="nivel">Nivel (1-5)</label>
        <input id="nivel" type="number" name="nivel" min="1" max="5" value="1" required>
      </div>
      <button type="submit" class="btn-agregar">Agregar</button>
    </form>
  </aside>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
