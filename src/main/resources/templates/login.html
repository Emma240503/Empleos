<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BolsaEmpleo – Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            font-size: 14px;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
        }
        nav {
            background: #222;
            display: flex;
            align-items: center;
            padding: 0 20px;
            height: 48px;
            gap: 24px;
        }
        .nav-brand { color: #fff; font-weight: bold; font-size: 15px; text-decoration: none; }
        nav a { color: #ccc; text-decoration: none; font-size: 13px; }
        nav a:hover { color: #fff; }
        .nav-right { margin-left: auto; }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }
        .card {
            background: #e8e8e8;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 32px 40px 40px;
            width: 320px;
            text-align: center;
        }
        .card h1 { font-size: 20px; font-weight: normal; margin-bottom: 16px; }
        .avatar { width: 52px; height: 52px; margin: 0 auto 20px; }
        .field { text-align: left; margin-bottom: 14px; }
        .field label { display: block; font-size: 13px; margin-bottom: 4px; color: #444; }
        .field input, .field select {
            width: 100%; padding: 7px 10px;
            border: 1px solid #aaa; border-radius: 3px;
            font-size: 13px; background: #fff; outline: none;
        }
        .field input:focus { border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,0.25); }
        .alert-error {
            background: #fdd; border: 1px solid #f99;
            border-radius: 3px; padding: 8px 10px;
            font-size: 12px; color: #c00; margin-bottom: 14px; text-align: left;
        }
        .btn-entrar {
            background: #3a7bd5; color: #fff; border: none;
            border-radius: 3px; padding: 8px 22px;
            font-size: 13px; cursor: pointer; margin-top: 4px;
        }
        .btn-entrar:hover { background: #2f6abf; }
        footer {
            background: #222; color: #ccc; font-size: 12px;
            padding: 12px 20px; display: flex; justify-content: space-between;
        }
        footer p:first-child { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">BolsaEmpleo</a>
    <a th:href="@{/puestos/buscar}">Buscar puestos</a>
    <a th:href="@{/registro/empresa}">Registro Empresa</a>
    <a th:href="@{/registro/oferente}">Registro Oferente</a>
    <a th:href="@{/login}" class="nav-right">Login</a>
</nav>

<main>
    <div class="card">
        <h1>Login</h1>

        <svg class="avatar" viewBox="0 0 52 52" fill="none">
            <circle cx="26" cy="26" r="26" fill="#d0d8e8"/>
            <circle cx="26" cy="20" r="9" fill="#7a9abf"/>
            <ellipse cx="26" cy="42" rx="14" ry="9" fill="#7a9abf"/>
        </svg>

        <div class="alert-error" th:if="${param.error}">
            Usuario o contraseña incorrectos.
        </div>
        <div class="alert-error" th:if="${param.inactivo}">
            Tu cuenta aún no ha sido aprobada por el administrador.
        </div>

        <form th:action="@{/login}" method="post">

            <div class="field">
                <label>Rol</label>
                <select name="rol" id="rol">
                    <option value="empresa">Empresa</option>
                    <option value="oferente">Oferente</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>

            <div class="field">
                <label>Usuario (correo o ID)</label>
                <input type="text" name="usuario" required autocomplete="username">
            </div>

            <div class="field">
                <label>Contraseña</label>
                <input type="password" name="clave" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>
        </form>
    </div>
</main>

<footer>
    <div>
        <p>Bolsa de Empleo</p>
        <p>Total Soft Inc.</p>
    </div>
    <div style="text-align:right">
        <p>Contacto: info@bolsaempleo.local</p>
        <p>Créditos: Equipo de desarrollo</p>
    </div>
</footer>

</body>
</html>
