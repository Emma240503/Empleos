<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Login', '/css/Utiles/login.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav th:replace="~{fragments :: nav}"></nav>
<main>
    <div class="card">
        <svg class="avatar" viewBox="0 0 52 52" fill="none">
            <circle cx="26" cy="26" r="26" fill="#d0d8e8"/>
            <circle cx="26" cy="20" r="9" fill="#7a9abf"/>
            <ellipse cx="26" cy="42" rx="14" ry="9" fill="#7a9abf"/>
        </svg>

        <form th:action="@{/login}" method="post">
            <div class="field">
                <label for="rol">Rol</label>
                <select name="rol" id="rol">
                    <option value="empresa">Empresa</option>
                    <option value="oferente">Oferente</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>

            <div class="field">
                <label for="usuario">Usuario (correo o ID)</label>
                <input id="usuario" type="text" name="usuario" required autocomplete="username">
            </div>

            <div class="field">
                <label for="clave">Contraseña</label>
                <input id="clave" type="password" name="clave" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>
        </form>
    </div>

    <div th:if="${param.error}" class="alert-error">
        <p>Usuario o contraseña incorrectos.</p>
    </div>
    <div th:if="${param.inactivo}" class="alert-error">
        <p>Tu cuenta aún no ha sido aprobada por el administrador.</p>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
