<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('BolsaEmpleo - Buscar puestos', '/css/buscar.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav th:replace="~{fragments :: nav}"></nav>
<main>
  <h1>Buscar puestos por características</h1>
  <p class="subtitulo">Selecciona una o varias características para filtrar ofertas publicas.</p>
  <div class="layout" th:classappend="${buscado} ? '' : ' layout-solo'">
    <div class="form-panel">
      <h2>Filtros</h2>
      <form th:action="@{/puestos/buscar}" method="get">
        <ul class="caract-lista">
          <li th:each="c : ${caracteristicas}">
            <label>
              <input type="checkbox" name="caracteristicaIds" th:value="${c.caracteristicaId}">
              <span th:text="${c.nombre}">Nombre</span>
            </label>
          </li>
        </ul>
        <div class="btn-row">
          <button type="submit" class="btn-buscar">Buscar</button>
          <a class="btn-limpiar" th:href="@{/puestos/buscar}">Limpiar</a>
        </div>
      </form>
    </div>
    <div class="resultados" th:if="${buscado}">
      <h2>Resultados</h2>
      <div class="resultados-grid">
        <div th:each="p : ${resultados}" class="puesto-card">
          <p class="empresa-nombre" th:text="${p.empresa.nombre}"></p>
          <p class="puesto-desc" th:text="${p.descripcion}"></p>
        <p class="salario">Salario: ₡<span th:text="${p.salario}"></span></p>
        </div>
      </div>
      <p class="vacio" th:if="${#lists.isEmpty(resultados)}">No se encontraron puestos.</p>
    </div>
  </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
