<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Admin - Empresas pendientes', '/css/Admin/admin-pendientes.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav>
    <a th:href="@{/admin/oferentes/pendientes}">Oferentes pendientes</a>
    <a th:href="@{/admin/caracteristicas}">Caracteristicas</a>
    <div class="nav-right">
        <span class="nav-user" th:if="${nombre != null}" th:text="${nombre}">Admin</span>
        <a class="btn-salir" th:href="@{/logout}">Salir</a>
    </div>
</nav>
<main>
    <h1>Empresas pendientes</h1>
    <div class="table-wrap" th:if="${#lists.size(empresas) > 0}">
        <table>
            <tr>
                <th>Correo</th>
                <th>Nombre</th>
                <th>Accion</th>
            </tr>
            <tr th:each="e : ${empresas}">
                <td th:text="${e.correo}"></td>
                <td th:text="${e.nombre}"></td>
                <td>
                    <form th:action="@{/admin/empresas/aprobar/{id}(id=${e.id})}" method="post">
                        <button type="submit" class="btn-aprobar">Aprobar</button>
                    </form>
                </td>
            </tr>
        </table>
    </div>
    <p class="vacio" th:if="${#lists.size(empresas) == 0}">No hay empresas pendientes.</p>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
