<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Admin - Oferentes pendientes', '/css/admin-empresas-pendientes.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav>
    <a th:href="@{/admin/empresas/pendientes}">Empresas pendientes</a>
    <a th:href="@{/admin/caracteristicas}">Caracteristicas</a>
    <div class="nav-right">
        <span class="nav-user" th:if="${nombre != null}" th:text="${nombre}">Admin</span>
        <a class="btn-salir" th:href="@{/logout}">Salir</a>
    </div>
</nav>
<main>
    <h1>Oferentes pendientes</h1>
    <div class="table-wrap" th:if="${#lists.size(oferentes) > 0}">
        <table>
            <tr>
                <th>Correo</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Accion</th>
            </tr>
            <tr th:each="o : ${oferentes}">
                <td th:text="${o.correo}"></td>
                <td th:text="${o.nombre}"></td>
                <td th:text="${o.primerApellido}"></td>
                <td>
                    <form th:action="@{/admin/oferentes/aprobar/{id}(id=${o.id})}" method="post">
                        <button type="submit" class="btn-aprobar">Aprobar</button>
                    </form>
                </td>
            </tr>
        </table>
    </div>
    <p class="vacio" th:if="${#lists.size(oferentes) == 0}">No hay oferentes pendientes.</p>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
