<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin – Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; font-size: 14px; background: #f0f0f0; display: flex; flex-direction: column; min-height: 100vh; color: #333; }
        nav { background: #222; display: flex; align-items: center; padding: 0 20px; height: 48px; gap: 24px; }
        .nav-brand { color: #fff; font-weight: bold; font-size: 15px; text-decoration: none; }
        nav a { color: #ccc; text-decoration: none; font-size: 13px; }
        nav a:hover { color: #fff; }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        .nav-user { color: #ccc; font-size: 13px; }
        .btn-salir { background: #555; color: #fff; border: none; border-radius: 3px; padding: 4px 12px; font-size: 12px; cursor: pointer; text-decoration: none; }
        .btn-salir:hover { background: #777; }
        main { flex: 1; padding: 32px 40px; }
        h1 { font-size: 22px; font-weight: normal; margin-bottom: 6px; }
        .subtitulo { color: #666; font-size: 13px; margin-bottom: 24px; }
        .btn-grid { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { display: inline-block; background: #3a7bd5; color: #fff; border: none; border-radius: 3px; padding: 8px 20px; font-size: 13px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #2f6abf; }
        .btn-green { background: #2e7d32; }
        .btn-green:hover { background: #1b5e20; }
        footer { background: #222; color: #ccc; font-size: 12px; padding: 12px 20px; display: flex; justify-content: space-between; margin-top: auto; }
        footer p:first-child { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" th:href="@{/admin/dashboard}">BolsaEmpleo</a>
    <a th:href="@{/admin/empresas/pendientes}">Empresas pendientes</a>
    <a th:href="@{/admin/oferentes/pendientes}">Oferentes pendientes</a>
    <a th:href="@{/admin/caracteristicas}">Características</a>
    <div class="nav-right">
        <span class="nav-user" th:text="${nombre}">Admin</span>
        <a class="btn-salir" th:href="@{/logout}">Salir</a>
    </div>
</nav>
<main>
    <h1>Administrador</h1>
    <p class="subtitulo">Aprobaciones y catálogo de características.</p>
    <div class="btn-grid">
        <a class="btn" th:href="@{/admin/empresas/pendientes}">Empresas pendientes</a>
        <a class="btn btn-green" th:href="@{/admin/oferentes/pendientes}">Oferentes pendientes</a>
        <a class="btn" th:href="@{/admin/caracteristicas}">Características</a>
    </div>
</main>
<footer>
    <div><p>Bolsa de Empleo</p><p>Total Soft Inc.</p></div>
    <div style="text-align:right"><p>Contacto: info@bolsaempleo.local</p><p>Créditos: Equipo de desarrollo</p></div>
</footer>
</body>
</html>
