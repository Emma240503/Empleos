<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin – Características</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; font-size: 14px; background: #f0f0f0; display: flex; flex-direction: column; min-height: 100vh; color: #333; }
        nav { background: #222; display: flex; align-items: center; padding: 0 20px; height: 48px; gap: 24px; }
        .nav-brand { color: #fff; font-weight: bold; font-size: 15px; text-decoration: none; }
        nav a { color: #ccc; text-decoration: none; font-size: 13px; }
        nav a:hover { color: #fff; }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        .btn-salir { background: #555; color: #fff; border: none; border-radius: 3px; padding: 4px 12px; font-size: 12px; text-decoration: none; }
        main { flex: 1; padding: 32px 40px; display: flex; gap: 40px; align-items: flex-start; }
        .panel-left { flex: 1; }
        h1 { font-size: 22px; font-weight: normal; margin-bottom: 14px; }
        .ruta { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
        .ruta-label { font-size: 12px; color: #666; margin-right: 4px; }
        .btn-ruta { background: #3a7bd5; color: #fff; border: none; border-radius: 3px; padding: 3px 12px; font-size: 12px; text-decoration: none; }
        .btn-ruta:hover { background: #2f6abf; }
        .ruta-sep { color: #aaa; font-size: 12px; }
        .subtitulo { font-size: 13px; color: #555; margin-bottom: 14px; }
        .cat-lista { background: #e8e8e8; border: 1px solid #ccc; border-radius: 4px; padding: 12px 16px; min-width: 260px; }
        .cat-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #ccc; font-size: 13px; }
        .cat-item:last-child { border-bottom: none; }
        .btn-entrar { background: #555; color: #fff; border: none; border-radius: 3px; padding: 3px 12px; font-size: 12px; text-decoration: none; }
        .btn-entrar:hover { background: #333; }
        .vacio { color: #888; font-style: italic; font-size: 13px; padding: 8px 0; }
        .panel-right { background: #e8e8e8; border: 1px solid #ccc; border-radius: 4px; padding: 20px 24px; width: 280px; flex-shrink: 0; }
        .panel-right h2 { font-size: 15px; font-weight: normal; margin-bottom: 14px; }
        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 13px; margin-bottom: 4px; color: #444; }
        .field input, .field select { width: 100%; padding: 7px 10px; border: 1px solid #aaa; border-radius: 3px; font-size: 13px; background: #fff; }
        .btn-crear { background: #2e7d32; color: #fff; border: none; border-radius: 3px; padding: 7px 20px; font-size: 13px; cursor: pointer; }
        .btn-crear:hover { background: #1b5e20; }
        footer { background: #222; color: #ccc; font-size: 12px; padding: 12px 20px; display: flex; justify-content: space-between; margin-top: auto; }
        footer p:first-child { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" th:href="@{/admin/dashboard}">BolsaEmpleo</a>
    <a th:href="@{/admin/empresas/pendientes}">Empresas pendientes</a>
    <a th:href="@{/admin/oferentes/pendientes}">Oferentes pendientes</a>
    <a th:href="@{/admin/caracteristicas}">Características</a>
    <div class="nav-right">
        <a class="btn-salir" th:href="@{/logout}">Salir</a>
    </div>
</nav>
<main>
    <div class="panel-left">
        <h1>Características</h1>
        <div class="ruta">
            <span class="ruta-label">Ruta:</span>
            <a class="btn-ruta" th:href="@{/admin/caracteristicas}">Raíces</a>
            <th:block th:each="r : ${ruta}">
                <span class="ruta-sep">/</span>
                <a class="btn-ruta"
                   th:href="@{/admin/caracteristicas(actualId=${r.caracteristicaId})}"
                   th:text="${r.nombre}">Nivel</a>
            </th:block>
        </div>
        <p class="subtitulo"
           th:text="${actual != null ? 'Subcategorías de: ' + actual.nombre : 'Categorías: raíces'}">
        </p>
        <div class="cat-lista">
            <div class="cat-item" th:each="c : ${subCategorias}">
                <span th:text="${c.nombre}">Nombre</span>
                <a class="btn-entrar"
                   th:href="@{/admin/caracteristicas(actualId=${c.caracteristicaId})}">Entrar</a>
            </div>
            <p class="vacio" th:if="${#lists.isEmpty(subCategorias)}">Sin subcategorías.</p>
        </div>
    </div>

    <div class="panel-right">
        <h2>Agregar Característica</h2>
        <form th:action="@{/admin/caracteristicas/crear}" method="post">
            <input type="hidden" name="actualId" th:value="${actualId}">
            <div class="field">
                <label>Nombre</label>
                <input type="text" name="nombre" required>
            </div>
            <div class="field">
                <label>Padre</label>
                <select name="padreId">
                    <option value="">(sin padre)</option>
                    <option th:each="c : ${todasCaracteristicas}"
                            th:value="${c.caracteristicaId}"
                            th:text="${c.nombre}"
                            th:selected="${actual != null and actual.caracteristicaId == c.caracteristicaId}">
                    </option>
                </select>
            </div>
            <button type="submit" class="btn-crear">Crear</button>
        </form>
    </div>
</main>
<footer>
    <div><p>Bolsa de Empleo</p><p>Total Soft Inc.</p></div>
    <div style="text-align:right"><p>Contacto: info@bolsaempleo.local</p><p>Créditos: Equipo de desarrollo</p></div>
</footer>
</body>
</html>
