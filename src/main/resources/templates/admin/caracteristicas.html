<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Admin - Caracteristicas', '/css/admin-caracteristicas.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav>
    <a th:href="@{/admin/empresas/pendientes}">Empresas pendientes</a>
    <a th:href="@{/admin/oferentes/pendientes}">Oferentes pendientes</a>
    <div class="nav-right">
        <span class="nav-user" th:if="${nombre != null}" th:text="${nombre}">Admin</span>
        <a class="btn-salir" th:href="@{/logout}">Salir</a>
    </div>
</nav>
<main>
    <div class="panel-left">
        <h1>Caracteristicas</h1>
        <div class="ruta">
            <span class="ruta-label">Ruta:</span>
            <a class="btn-ruta" th:href="@{/admin/caracteristicas}">Raíces</a>
            <th:block th:each="r : ${ruta}">
                <span class="ruta-sep">/</span>
                <a class="btn-ruta"
                   th:href="@{/admin/caracteristicas(actualId=${r.caracteristicaId})}"
                   th:text="${r.nombre}">Nivel</a>
            </th:block>
        </div>
        <p class="subtitulo"
           th:text="${actual != null ? 'Subcategorías de: ' + actual.nombre : 'Categorías: raíces'}">
        </p>
        <div class="cat-lista">
            <div class="cat-item" th:each="c : ${subCategorias}">
                <span th:text="${c.nombre}">Nombre</span>
                <a class="btn-entrar"
                   th:href="@{/admin/caracteristicas(actualId=${c.caracteristicaId})}">Entrar</a>
            </div>
            <p class="vacio" th:if="${#lists.isEmpty(subCategorias)}">Sin subcategorías.</p>
        </div>
    </div>

    <div class="panel-right">
        <h2>Agregar Caracteristica</h2>
        <form th:action="@{/admin/caracteristicas/crear}" method="post">
            <input type="hidden" name="actualId" th:value="${actualId}">
            <div class="field">
                <label for="nombre">Nombre</label>
                <input id="nombre" type="text" name="nombre" required>
            </div>
            <div class="field">
                <label for="padreId">Padre</label>
                <select id="padreId" name="padreId">
                    <option value="">(sin padre)</option>
                    <option th:each="c : ${todasCaracteristicas}"
                            th:value="${c.caracteristicaId}"
                            th:text="${c.nombre}"
                            th:selected="${actual != null and actual.caracteristicaId == c.caracteristicaId}">
                    </option>
                </select>
            </div>
            <button type="submit" class="btn-crear">Crear</button>
        </form>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
